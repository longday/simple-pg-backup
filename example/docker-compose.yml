
services:
  postgres-backup:
    # image: longday/simple-pg-backup:latest
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BASETAG: 18-alpine
        GOCRONVER: v0.0.11
    container_name: pg-backup-local
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}   # comma/space separated, or "*" for all non-template databases
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SSH_HOST: ${SSH_HOST}
      SSH_PORT: ${SSH_PORT}
      SSH_USER: ${SSH_USER}
      SCHEDULE: "0 2 * * *"
      BACKUP_ON_START: "TRUE"
      BACKUP_KEEP_MINS: "1440"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "2"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 5m
      timeout: 3s
      retries: 3
      start_period: 30s
    volumes:
      - ./backups:/backups
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${SSH_KEY_PATH}:/run/secrets/ssh_key:ro
